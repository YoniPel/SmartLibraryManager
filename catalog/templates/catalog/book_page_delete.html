{% extends "catalog/index.html" %}

{% block content %}
<div class="container mt-5 mb-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0">אישור מחיקה</h4>
                </div>
                <div class="card-body text-center p-4">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    <p class="lead mt-3">האם אתה בטוח שברצונך למחוק את הספר?</p>
                    <h3 class="text-dark mb-4">"{{ object.title }}"</h3>

                    {% if object.cover_image %}
                        <img src="{{ object.cover_image }}" alt="כריכה" class="img-thumbnail mb-3" style="max-height: 150px;">
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        {{ form }}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4">
                                ביטול
                            </a>
                            <button type="submit" class="btn btn-danger px-4">
                                אישור מחיקה
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-muted text-center small">
                    פעולה זו היא סופית ולא ניתן לבטלה.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
