{% extends "catalog/index.html" %}

{% block content %}
<div class="container mt-5 mb-5" dir="rtl">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white p-4">
                    <h3 class="mb-0 text-center">הוספת ספר חדש למערכת</h3>
                </div>
                <div class="card-body p-4">

                    <ul class="nav nav-pills nav-fill mb-4" id="bookFormTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="isbn-tab" data-bs-toggle="tab" data-bs-target="#isbn-form-pane" type="button" role="tab">לפי מספר ISBN</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="title-tab" data-bs-toggle="tab" data-bs-target="#title-form-pane" type="button" role="tab">לפי שם ספר</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="bookFormTabContent">

                        <div class="tab-pane fade show active" id="isbn-form-pane" role="tabpanel" aria-labelledby="isbn-tab">
                            <form method="post">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">מספר ISBN</label>
                                    {{ isbn_form.isbn }}
                                    <div class="form-text">הזן ISBN בן 10 או 13 ספרות.</div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" name="submit_isbn" class="btn btn-outline-primary">
                                        <i class="bi bi-search me-2"></i> חפש והוסף ספר
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="title-form-pane" role="tabpanel" aria-labelledby="title-tab">
                            <form method="post">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">שם הספר</label>
                                    {{ title_form.title }}
                                    <div class="form-text">כתוב את שם הספר (למשל: "מרחבים מסתברים").</div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" name="submit_title" class="btn btn-outline-primary">
                                        <i class="bi bi-book me-2"></i>     חפש ספר לפי שם
                                    </button>
                                </div>
                            </form>
                        </div>

                    </div> </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'home' %}" class="text-secondary text-decoration-none">חזרה לעמוד הבית</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
